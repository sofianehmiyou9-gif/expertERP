<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00288E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0058BE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGradient)"/>

  <!-- Subtle inner circle border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- Letter E -->
  <text x="20" y="44" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">E</text>

  <!-- Letter H -->
  <text x="44" y="44" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">H</text>
</svg>
