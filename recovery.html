<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recovery Redirect - ExpertERP</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
:root {
  --ink: #111827;
  --paper: #f8fafc;
  --accent: #2563eb;
  --muted: #6b7280;
  --border: #e5e7eb;
  --card: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
.card {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
}
h1 {
  font-size: 1.35rem;
  margin-bottom: 0.75rem;
}
p {
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: 0.75rem;
}
a {
  color: var(--accent);
}
.mono {
  font-family: Consolas, monospace;
  word-break: break-all;
  font-size: 0.85rem;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 0;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
  padding: 0.65rem 1rem;
  cursor: pointer;
  text-decoration: none;
}

/* === PAGE VISUAL POLISH === */

/* Page load animation */
@keyframes pageLoad {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
body {
  animation: pageLoad 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Form card animation */
.card {
  transition: box-shadow 0.3s ease;
}
.card:hover {
  box-shadow: 0 12px 40px rgba(37, 99, 235, 0.08), 0 4px 12px rgba(0,0,0,0.04);
}

/* Button interactions */
.btn {
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, background-color 0.2s ease !important;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(37, 99, 235, 0.2);
}
.btn:active {
  transform: translateY(0) scale(0.97);
}

/* Text animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
p {
  animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Smooth scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(37, 99, 235, 0.3); }

/* Better mobile */
@media (max-width: 480px) {
  body {
    padding: 1rem !important;
  }
  .card {
    padding: 1.25rem !important;
    border-radius: 16px !important;
    margin: 0.5rem !important;
  }
  h1 { font-size: 1.35rem !important; }
}

@media (prefers-reduced-motion: reduce) {
  body, .card, p { animation: none !important; transition: none !important; }
}
</style>
<!-- saas-overrides.css removed -->
</head>
<body>
  <div class="card">
    <h1>Redirection vers la reinitialisation</h1>
    <p id="status">Verification du lien en cours...</p>
    <p id="fallback-copy" class="mono" style="display:none;"></p>
    <p id="fallback-link" style="display:none;"><a id="manual-link" class="btn" href="reset-password.html">Continuer vers la reinitialisation</a></p>
  </div>

  <script>
  (function () {
    var search = window.location.search || "";
    var hash = window.location.hash || "";
    var target = window.location.origin + "/reset-password.html" + search + hash;
    var status = document.getElementById("status");
    var fallbackCopy = document.getElementById("fallback-copy");
    var fallbackLink = document.getElementById("fallback-link");
    var manualLink = document.getElementById("manual-link");

    manualLink.href = target;
    fallbackCopy.textContent = target;

    var hasRecoverySignal = /access_token=|token_hash=|type=recovery|code=/.test(search + hash);
    if (!hasRecoverySignal) {
      status.textContent = "Lien de reinitialisation invalide ou incomplet.";
      fallbackCopy.style.display = "block";
      fallbackLink.style.display = "block";
      return;
    }

    status.textContent = "Lien valide. Redirection en cours...";
    window.location.assign(target);

    window.setTimeout(function () {
      status.textContent = "Si vous restez sur cette page, cliquez sur le bouton ci-dessous.";
      fallbackCopy.style.display = "block";
      fallbackLink.style.display = "block";
    }, 1200);
  })();
  </script>
</body>
</html>
