<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Consultant - ERP Talent</title>
    <link rel="canonical" href="https://experterp.ca/inscription-consultant.html" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Manrope:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0e0e0e;
            --paper: #f8fafc;
            --accent: #2563eb;
            --accent-dark: #1e40af;
            --accent-light: #eff6ff;
            --blue: #2563eb;
            --blue-mid: #1e40af;
            --blue-light: #dbeafe;
            --muted: #8a8580;
            --border: #e0dbd4;
            --card: #fff;
            --green: #065f46;
            --green-bg: #ecfdf5;
            --red: #7f1d1d;
            --red-bg: #fef2f2;
            --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #fff 100%);
            color: var(--ink);
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(245, 242, 237, .95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(224, 219, 212, .5);
            padding: 0 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            box-shadow: var(--shadow-sm);
        }

        .inscription-container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 2.5rem;
        }

        h1 {
            font-family: 'Newsreader', serif;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--ink);
        }

        h2 {
            font-family: 'Newsreader', serif;
            font-size: 1.4rem;
            color: var(--blue);
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--ink);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 0.85rem 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: 'Manrope', sans-serif;
            font-size: 0.95rem;
            color: #0f172a;
            background: #f8fafc;
            transition: all .3s ease;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="tel"]::placeholder,
        textarea::placeholder {
            color: #64748b;
            opacity: 1;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .experience-block {
            background: var(--accent-light);
            border: 1px solid var(--accent);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            position: relative;
            box-shadow: 0 4px 24px rgba(0,0,0,.04);
        }

        .experience-block h3 {
            color: var(--blue);
            margin-bottom: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-family: 'Manrope', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all .3s ease;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--blue);
            color: var(--card);
            width: 100%;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background: var(--blue-mid);
        }

        .btn-secondary {
            background: var(--accent);
            color: var(--card);
        }

        .btn-secondary:hover {
            background: var(--accent-dark);
        }

        .btn-remove {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            position: absolute;
            top: 1rem;
            right: 1rem;
        }

        .btn-remove:hover {
            background: var(--red);
            color: var(--card);
        }

        .message {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            display: block;
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green);
        }

        .message.error {
            display: block;
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red);
        }

        footer {
            background: var(--ink);
            color: var(--paper);
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* === PAGE VISUAL POLISH === */

        /* Page load animation */
        @keyframes pageLoad {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        body {
          animation: pageLoad 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Form card animation */
        form {
          transition: box-shadow 0.3s ease;
        }
        form:hover {
          box-shadow: 0 12px 40px rgba(37, 99, 235, 0.08), 0 4px 12px rgba(0,0,0,0.04);
        }

        /* Input focus effects */
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
          box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1), 0 1px 2px rgba(0,0,0,0.04) !important;
          border-color: #2563eb !important;
          transition: box-shadow 0.25s ease, border-color 0.25s ease !important;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
          transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        /* Button interactions */
        .btn-primary {
          transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, background-color 0.2s ease !important;
        }
        .btn-primary:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 24px rgba(37, 99, 235, 0.2);
        }
        .btn-primary:active {
          transform: translateY(0) scale(0.97);
        }

        .btn-secondary {
          transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, background-color 0.2s ease !important;
        }
        .btn-secondary:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 24px rgba(37, 99, 235, 0.2);
        }
        .btn-secondary:active {
          transform: translateY(0) scale(0.97);
        }

        /* Experience block animations */
        .experience-block {
          transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .experience-block:hover {
          box-shadow: 0 8px 32px rgba(37, 99, 235, 0.12);
          transform: translateY(-2px);
        }

        /* Error/success message animations */
        @keyframes slideDown {
          from { opacity: 0; transform: translateY(-10px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .message {
          animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Smooth scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(37, 99, 235, 0.3); }

        /* Better mobile */
        @media (max-width: 480px) {
          .inscription-container {
            margin: 1rem auto !important;
            padding: 0.5rem !important;
          }
          form {
            padding: 1.25rem !important;
            border-radius: 16px !important;
          }
          h1, h2 { font-size: 1.35rem !important; }
          input, textarea { font-size: 16px !important; /* Prevents iOS zoom */ }
        }

        @media (prefers-reduced-motion: reduce) {
          body, form, .experience-block { animation: none !important; transition: none !important; }
        }
    </style>
<!-- saas-overrides.css removed -->
</head>
<body>
    <nav>
        <div class="logo">Expert<span style="color: var(--accent);">ERP</span>Hub</div>
        <div class="nav-links">
            <a class="nav-link" href="consultant">Consultants</a>
            <a class="nav-link active" href="inscription-consultant.html">Inscription</a>
        </div>
    </nav>

    <div class="inscription-container">
        <h1>Formulaire d'Inscription</h1>
        <div id="messageInscription" class="message"></div>

        <form id="inscriptionForm">
            <h2>Informations Personnelles</h2>

            <div class="form-row">
                <div class="form-group">
                    <label for="nom">Nom *</label>
                    <input type="text" id="nom" name="nom" required>
                </div>
                <div class="form-group">
                    <label for="prenom">Prénom *</label>
                    <input type="text" id="prenom" name="prenom" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="telephone">Téléphone *</label>
                    <input type="tel" id="telephone" name="telephone" required>
                </div>
            </div>

            <div class="form-group">
                <label for="titre">Titre Professionnel *</label>
                <input type="text" id="titre" name="titre" required>
            </div>

            <div class="form-group">
                <label for="resume">Résumé Professionnel *</label>
                <textarea id="resume" name="resume" required></textarea>
            </div>

            <h2>Spécialité ERP</h2>
            <div class="form-group">
              <label>Sélectionnez votre ERP principal *</label>
              <div id="erpSelector" style="display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.35rem;">
                <button type="button" class="erp-chip" data-erp="SAP" onclick="selectErpChip(this)" style="padding:.45rem 1rem;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;">SAP</button>
                <button type="button" class="erp-chip" data-erp="Oracle" onclick="selectErpChip(this)" style="padding:.45rem 1rem;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;">Oracle</button>
                <button type="button" class="erp-chip" data-erp="Dynamics" onclick="selectErpChip(this)" style="padding:.45rem 1rem;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;">Dynamics 365</button>
                <button type="button" class="erp-chip" data-erp="Workday" onclick="selectErpChip(this)" style="padding:.45rem 1rem;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;">Workday</button>
                <button type="button" class="erp-chip" data-erp="Autre" onclick="selectErpChip(this)" style="padding:.45rem 1rem;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;">Autre</button>
              </div>
            </div>

            <h2>Expériences Professionnelles</h2>
            <div id="experiencesContainer"></div>
            <button type="button" class="btn btn-secondary" onclick="ajouterExperience()">+ Ajouter une expérience</button>

            <h2>Compétences</h2>
            <div class="form-group">
                <label for="competences">Compétences (séparées par des virgules)</label>
                <textarea id="competences" name="competences" placeholder="Ex: ERP, SAP, Développement Web..."></textarea>
            </div>

            <!-- Consentement obligatoire -->
            <div class="form-group" style="margin-top:20px;">
              <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:.88rem;line-height:1.5;">
                <input type="checkbox" id="consent-checkbox" required style="margin-top:3px;width:18px;height:18px;flex-shrink:0;accent-color:#2563eb;">
                <span>J'ai lu et j'accepte la <a href="privacy.html" target="_blank" style="color:#2563eb;text-decoration:underline;">politique de confidentialité</a> et les <a href="conditions.html" target="_blank" style="color:#2563eb;text-decoration:underline;">conditions d'utilisation</a> d'ExpertERPHub. <span style="color:#dc2626;">*</span></span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary">Valider l'Inscription</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 ExpertERPHub. Tous droits réservés.
          | <a href="privacy.html" style="color:#6b7280;">Confidentialité</a>
          | <a href="conditions.html" style="color:#6b7280;">Conditions</a>
          | <a href="mentions.html" style="color:#6b7280;">Mentions légales</a>
        </p>
    </footer>

    <script src="config.js"></script>
    <script src="supabase-helpers.js"></script>
    <script src="inscription-consultant.js"></script>
    <script src="cookie-consent.js"></script>
</body>
</html>
