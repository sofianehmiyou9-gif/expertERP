<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reinitialisation mot de passe — ExpertERPHub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e0e0e;--paper:#ffffff;--accent:#1e3a8a;--blue:#1e3a8a;--blue-mid:#1d4ed8;
  --blue-light:#ebf2fb;--blue-border:#bfdbfe;--muted:#8a8580;--border:#e0dbd4;--card:#fff;
  --green:#16a34a;--red:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;max-width:460px;width:100%;padding:2rem;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;text-align:center;margin-bottom:1.2rem;}
.logo span{color:var(--accent);}
h1{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:.8rem;}
.desc{font-size:.86rem;color:var(--muted);line-height:1.7;margin-bottom:1rem;}
label{display:block;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.45rem;}
input{width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:6px;font-size:.9rem;margin-bottom:.9rem;}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,58,138,.08);}
button{width:100%;padding:.72rem .9rem;border:none;border-radius:6px;background:var(--blue);color:#fff;cursor:pointer;font-weight:500;}
button:hover{background:var(--blue-mid);}
.message{font-size:.82rem;line-height:1.7;margin-top:.8rem;min-height:1.2rem;}
.message.error{color:var(--red);}
.message.success{color:var(--green);}
.link-row{margin-top:1rem;text-align:center;}
.link-row a{font-size:.82rem;color:var(--blue);text-decoration:underline;}
.helper{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:8px;padding:.8rem .9rem;font-size:.78rem;line-height:1.6;color:var(--muted);margin-bottom:1rem;}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="logo">Expert<span>ERP</span>Hub</div>
    <h1>Definir un nouveau mot de passe</h1>
    <p class="desc">Ce formulaire est accessible uniquement via le lien recu par email.</p>
    <div class="helper" id="token-helper">Verification du lien en cours...</div>
    <label>Nouveau mot de passe</label>
    <input id="new-password" type="password" placeholder="8 caracteres minimum">
    <label>Confirmer le mot de passe</label>
    <input id="confirm-password" type="password" placeholder="Retapez le mot de passe">
    <button id="save-btn" type="button">Enregistrer le nouveau mot de passe</button>
    <div class="message" id="msg"></div>
    <div class="link-row"><a href="index.html">Retour a l'accueil</a></div>
  </div>
</div>

<script>
const SB_URL = 'https://aqvkcbeezzbmoiykzfyo.supabase.co';
const SB_KEY = 'sb_publishable_3ZOOWdx35IRT6UocT_s9PQ_hI0Yrbim';

let recoveryAccessToken = '';

function setMessage(text, kind) {
  const el = document.getElementById('msg');
  el.textContent = text || '';
  el.className = 'message ' + (kind || '');
}

function parseRecoveryParams() {
  const hash = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
  const query = new URLSearchParams(window.location.search || '');
  const token = hash.get('access_token') || query.get('access_token') || '';
  const type = hash.get('type') || query.get('type') || '';
  return { token, type };
}

async function sha256Hex(text) {
  const bytes = new TextEncoder().encode(String(text || ''));
  const hashBuffer = await crypto.subtle.digest('SHA-256', bytes);
  return Array.from(new Uint8Array(hashBuffer)).map((b) => b.toString(16).padStart(2, '0')).join('');
}

async function sbSelect(table, query) {
  const response = await fetch(SB_URL + '/rest/v1/' + table + '?' + query, {
    headers: {
      apikey: SB_KEY,
      Authorization: 'Bearer ' + SB_KEY
    }
  });
  if (!response.ok) throw new Error('Lecture base impossible');
  return response.json();
}

async function sbUpdate(table, id, data) {
  const response = await fetch(SB_URL + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id), {
    method: 'PATCH',
    headers: {
      apikey: SB_KEY,
      Authorization: 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!response.ok) throw new Error('Mise a jour base impossible');
}

function safeJsonParse(raw, fallback = {}) {
  if (!raw) return fallback;
  if (typeof raw === 'object') return raw;
  try { return JSON.parse(raw); } catch (e) { return fallback; }
}

async function getAuthUser(token) {
  const response = await fetch(SB_URL + '/auth/v1/user', {
    headers: {
      apikey: SB_KEY,
      Authorization: 'Bearer ' + token
    }
  });
  if (!response.ok) throw new Error('Lien invalide ou expire');
  return response.json();
}

async function updateAuthPassword(token, password) {
  const response = await fetch(SB_URL + '/auth/v1/user', {
    method: 'PUT',
    headers: {
      apikey: SB_KEY,
      Authorization: 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ password: password })
  });
  if (!response.ok) throw new Error('Impossible de mettre a jour le mot de passe');
}

async function syncLegacyHashesByEmail(email, passwordHash) {
  const consultants = await sbSelect('consultants', 'select=id,notes_admin&email=eq.' + encodeURIComponent(email));
  for (const c of consultants) {
    const notes = safeJsonParse(c.notes_admin, {});
    notes.auth_password_sha256 = passwordHash;
    await sbUpdate('consultants', c.id, { notes_admin: JSON.stringify(notes) });
  }

  const companies = await sbSelect('entreprises', 'select=id,description&email=eq.' + encodeURIComponent(email));
  for (const e of companies) {
    const desc = safeJsonParse(e.description, {});
    desc.auth_password_sha256 = passwordHash;
    await sbUpdate('entreprises', e.id, { description: JSON.stringify(desc) });
  }
}

async function saveNewPassword() {
  const pwd = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;

  if (!recoveryAccessToken) {
    setMessage('Lien de reinitialisation invalide.', 'error');
    return;
  }
  if (!pwd || pwd.length < 8) {
    setMessage('Le mot de passe doit contenir au moins 8 caracteres.', 'error');
    return;
  }
  if (pwd !== confirm) {
    setMessage('Les mots de passe ne correspondent pas.', 'error');
    return;
  }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Mise a jour...';

  try {
    const user = await getAuthUser(recoveryAccessToken);
    await updateAuthPassword(recoveryAccessToken, pwd);
    const hash = await sha256Hex(pwd);
    if (user && user.email) {
      await syncLegacyHashesByEmail(user.email, hash);
    }
    setMessage('Mot de passe mis a jour. Vous pouvez vous connecter.', 'success');
    document.getElementById('new-password').value = '';
    document.getElementById('confirm-password').value = '';
  } catch (e) {
    setMessage(e.message || 'Lien invalide ou expire.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enregistrer le nouveau mot de passe';
  }
}

(function init() {
  const helper = document.getElementById('token-helper');
  const params = parseRecoveryParams();
  recoveryAccessToken = params.token;
  if (!recoveryAccessToken) {
    helper.textContent = 'Lien invalide: aucun token de recuperation trouve.';
    helper.style.color = 'var(--red)';
    return;
  }
  helper.textContent = 'Lien valide. Definissez votre nouveau mot de passe.';
  helper.style.color = 'var(--green)';
})();

document.getElementById('save-btn').addEventListener('click', saveNewPassword);
document.getElementById('new-password').addEventListener('keypress', (e) => { if (e.key === 'Enter') saveNewPassword(); });
document.getElementById('confirm-password').addEventListener('keypress', (e) => { if (e.key === 'Enter') saveNewPassword(); });
</script>
</body>
</html>
